server:
  port: 4002
spring:
  application:
    name: skincare_assistant_api
  profiles:
    active: dev
  datasource:
    dynamic:
      primary: master
      datasource:
        master:
          username: ${MYSQL_USERNAME:root}
          password: ${MYSQL_ROOT_PASSWORD:}
          driver-class-name: com.mysql.cj.jdbc.Driver
          url: jdbc:mysql://${MYSQL_HOST:localhost}:${PORT_MYSQL:10020}/${MYSQL_DATABASE:tacomall}?serverTimezone=Asia/Shanghai&characterEncoding=utf-8&useSSL=false&rewriteBatchedStatements=true&allowPublicKeyRetrieval=true
  sql:
    init:
      mode: always
      continue-on-error: true
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:10010}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:500}
logging:
  level:
    com.tacomall.common.mapper: debug
    cn.binarywang.wx.miniapp: debug

mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0
  type-aliases-package: com.tacomall.common.mapper
  mapper-locations: classpath*:/mapper/**/*Mapper.xml
  configuration:
    call-setters-on-nulls: true

